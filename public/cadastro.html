<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHistory</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
</head>
<body>
    <div class="header">
            <div class="logo-text">
                <h1>MyHistory</h1>
                <img src="" alt="">
            </div>
            <div class="div-navbar">
                <li class="navbar">
                    <a href="index.html">Inicial</a>
                    <a>|</a>
                    <a href="login.html">Login</a>
                    <a>|</a>
                    <a href="#">Cadastro</a>
                    <a>|</a>
                    <a href="dashboard.html">Dashboard</a>
                </li>
            </div>
    </div>
    <div class="content center-box">
        <div class="account-box">
            <p>Nome de usuário</p>
            <input type="text" class="input-box" id="ipt_username" placeholder="exemplo.exemplar">
            <div id="username_val_msg"></div>
            <p>Email</p>
            <input type="text" class="input-box" id="ipt_email" placeholder="exemplo@companhia.com">
            <div id="email_val_msg"></div>
            <p>Senha</p>
            <input type="password" class="input-box" id="ipt_password" placeholder="***********" onkeyup="validarS()">
            <div class="password-val-msg" id="password_val_msg"></div>
            <button class="sign-up-button" onclick="cadastrar()">Cadastrar</button>
        </div>
        <p class="text-redirect">Já tem uma conta? <a href="login.html">Entrar</a></p>
    </div>
    <div class="footer">
        <p>Desenvolvido por: <a href="https://github.com/MatheusVizzaccaro">Matheus Vizzaccaro Gonçalves</a></p>
    </div>
</body>
</html>
<script src="js/validations.js"></script>
<script>
    function validar() {
        let email = ipt_email.value;
        let senha = ipt_password.value;

        if(isEmail(email)[0]) {
            email_val_msg.innerHTML = `<span class="success">${isEmail(email)[1]}</span>`
        } else {
            email_val_msg.innerHTML = `<span class="fail">${isEmail(email)[1]}</span>`
            return false;
        }

        if(!isPassword(senha)[0]) {
            return false;
        }

        return true;
    }

    function validarS() {
        let senha = ipt_password.value;

        let phases = isPassword(senha)[1];

        password_val_msg.innerHTML = `
         <ul class="password-list">
            <li class="" id="list_symbol">A senha não tem símbolos.</li>
            <li class="" id="list_number">A senha não tem números.</li>
            <li class="" id="list_capital">A senha não tem letras maiúsculas.</li>
        </ul>`;

        //fazer for
        if(phases[0] == false) {
            document.getElementById("list_symbol").classList.add("fail");
        } else {
            document.getElementById("list_symbol").classList.add("success");
        }
         
        if(phases[1] == false) {
            document.getElementById("list_number").classList.add("fail");
        } else {
            document.getElementById("list_number").classList.add("success");
        }
        
        if(phases[2] == false) {
            document.getElementById("list_capital").classList.add("fail");
        } else {
            document.getElementById("list_capital").classList.add("success");
        }
    }

    function cadastrar() {
        if(validar()) {
            //Cenário em que tudo está correto para prosseguir.
            alert("teste");
        }   
    }
</script>
