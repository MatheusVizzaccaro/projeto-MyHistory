<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHistory</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
</head>

<body>
    <div class="background-image">
        <div class="content">
            <div class="initial-content glass-efect">
                <div class="header">
                    <div class="logo-text">
                        <h1>MyHistory</h1>
                        <img src="" alt="">
                    </div>
                    <div class="div-navbar">
                        <li class="navbar">
                            <a href="../index.html">Inicial</a>
                            <div class="navbar-selected">
                                <a href="#"><b>Login</b></a>
                                <div class="selected-line"></div>
                            </div>
                            <a href="../auth/signup.html">Cadastro</a>
                            <a href="../index.html#game-section" class="minigame-button"><img src="../assets/icon/play_arrow.png">Jogar</a>
                        </li>
                    </div>
                </div>
                <div class="page-content">
                <div class="content center-box">
                    <div class="account-box">
                        <p>Email</p>
                        <input type="text" class="input-box" id="ipt_email" placeholder="exemplo@companhia.com">
                        <p>Senha</p>
                        <input type="password" class="input-box" id="ipt_password" placeholder="***********">
                        <button class="sign-up-button" onclick="loginUser()">Entrar</button>
                        <div id="login_msg" class="sign-up-msg"></div>
                        <p class="text-redirect">Não tem uma conta ainda? <a href="signup.html">Criar sua conta</a></p>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Desenvolvido por: <a href="https://github.com/MatheusVizzaccaro">Matheus Vizzaccaro Gonçalves</a></p>
    </div>
</body>
</html>
<script src="../js/validations.js"></script>
<script src="login.js"></script>
