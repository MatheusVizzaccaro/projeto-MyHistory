<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHistory</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
</head>
<body>
    <div class="header">
            <div class="logo-text">
                <h1>MyHistory</h1>
                <img src="" alt="">
            </div>
            <div class="div-navbar">
                <li class="navbar">
                    <a href="../index.html">Inicial</a>
                    <a>|</a>
                    <a href="../auth/login.html">Login</a>
                    <a>|</a>
                    <a href="#"><b>Cadastro</b></a>
                    <a>|</a>
                    <a href="../dashboard/dashboard.html">Dashboard</a>
                </li>
            </div>
    </div>
    <div class="content center-box">
        <div class="account-box">
            <p>Nome de usuário</p>
            <input type="text" class="input-box" id="ipt_username" placeholder="exemplo.exemplar" onblur="updateScreenUsername()">
            <div id="username_val_msg"></div>
            <p>Email</p>
            <input type="text" class="input-box" id="ipt_email" placeholder="exemplo@companhia.com" onblur="updateScreenEmail()">
            <div id="email_val_msg"></div>
            <p>Senha</p>
            <input type="password" class="input-box" id="ipt_password" placeholder="***********" onkeyup="updateScreenPassword()">
            <div class="password-val-msg" id="password_val_msg">
                <div id="password_list" class="password-list"></div>
            </div>
            <p>Confirmação de senha</p>
            <input type="password" class="input-box" id="ipt_password_confirm" placeholder="***********" onblur="updateScreenPasswordConfirm()">
            <div class="password-val-msg" id="password_confirm_val_msg">
                <div id="password_confirm_list" class="password-list"></div>
            </div>
            <button class="sign-up-button" onclick="insertUser()">Cadastrar</button>
            <div id="sign_up_msg" class="sign-up-msg"></div>
            <p class="text-redirect">Já tem uma conta? <a href="login.html">Entrar</a></p>
        </div>
    </div>
    <div class="footer">
        <p>Desenvolvido por: <a href="https://github.com/MatheusVizzaccaro">Matheus Vizzaccaro Gonçalves</a></p>
    </div>
</body>
</html>
<script src="../js/validations.js"></script>
<script src="signup.js"></script>
